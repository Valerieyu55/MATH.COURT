<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂教案：拋物線 - 看見數學的軌跡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f6f9;
            /* Light sky tint */
            color: #0f172a;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- Theme Specific Styles (Based on Image) --- */
        .bg-theme-grid {
            background-color: #85B8DF;
            /* Sky Blue from image */
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
        }

        .bg-theme-grid-light {
            background-color: #e0f2fe;
            background-image:
                linear-gradient(rgba(133, 184, 223, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(133, 184, 223, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .text-shadow-hero {
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.25), 0px 2px 4px rgba(0, 0, 0, 0.15);
        }

        /* Chart Container Styling Rules */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 450px;
        }

        @media (min-width: 768px) {
            .chart-container {
                height: 450px;
            }
        }

        /* Modern Nav Styling */
        .nav-item {
            position: relative;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background-color: #f97316;
            /* orange-500 */
            transition: width 0.3s ease;
        }

        .nav-item.active {
            color: #0284c7;
            /* sky-600 */
            font-weight: 900;
        }

        .nav-item.active::after {
            width: 100%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #bae6fd;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7dd3fc;
        }

        /* Sleek Animations */
        .fade-in {
            animation: fadeInSleek 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInSleek {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .basketball-bounce {
            display: inline-block;
            animation: bounceArc 2s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes bounceArc {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(180deg);
            }
        }

        /* Vending Machine Drop Animation */
        @keyframes drop-drink {
            0% {
                transform: translateY(-60px) scale(0.8);
                opacity: 0;
            }

            60% {
                transform: translateY(10px) scale(1.1);
                opacity: 1;
            }

            80% {
                transform: translateY(-5px) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .animate-drop {
            animation: drop-drink 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Fraction Math Styling */
        .fraction {
            display: inline-block;
            vertical-align: middle;
            margin: 0 0.2em;
            text-align: center;
            font-weight: bold;
        }

        .fraction>span {
            display: block;
            padding-top: 0.15em;
        }

        .fraction span.fdn {
            border-top: 2px solid #334155;
        }

        .fraction span.bar {
            display: none;
        }

        /* Range Slider Styling (Orange Theme) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 0 3px #ffffff, 0 0 0 5px rgba(249, 115, 22, 0.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e0f2fe;
            border-radius: 3px;
            border: 1px solid #bae6fd;
        }
    </style>
</head>

<body class="antialiased flex flex-col min-h-screen">

    <!-- Sporty Navigation -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-sky-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div
                        class="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center mr-3 shadow-md shadow-orange-200 border-2 border-white">
                        <span class="text-white text-sm">🏀</span>
                    </div>
                    <span class="text-xl font-black text-sky-800 tracking-wide">MATH<span
                            class="text-orange-500">.</span>COURT</span>
                </div>
                <div class="hidden md:flex space-x-6 items-center" id="nav-menu">
                    <!-- Nav items injected by JS -->
                </div>
                <div class="flex items-center md:hidden">
                    <button id="mobile-menu-btn"
                        class="text-sky-600 hover:text-sky-800 focus:outline-none text-2xl font-bold">
                        ≡
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Nav -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-sky-100 shadow-xl absolute w-full">
            <div class="px-4 py-3 space-y-1" id="mobile-nav-items"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full mb-24">
        <div id="content-area">
            <!-- Dynamic Content Loaded Here -->
        </div>
    </main>

    <!-- Presentation Controls -->
    <div
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-sky-100 z-40 shadow-[0_-4px_15px_rgba(14,165,233,0.05)]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <button id="btn-prev" onclick="goPrev()"
                class="flex items-center px-4 py-2 text-sky-500 hover:text-sky-800 hover:bg-sky-50 rounded-lg transition-colors font-bold text-sm tracking-wide disabled:opacity-30 disabled:cursor-not-allowed">
                <span class="mr-2 text-lg">←</span> 上一節
            </button>
            <div class="flex items-center gap-3">
                <div class="h-2 w-32 bg-sky-100 rounded-full overflow-hidden border border-sky-200">
                    <div id="progress-bar"
                        class="h-full bg-orange-500 transition-all duration-500 w-1/5 shadow-[0_0_10px_rgba(249,115,22,0.8)]">
                    </div>
                </div>
                <div id="progress-indicator" class="text-sm font-black text-sky-300 w-8 text-right font-mono">
                    1/5
                </div>
            </div>
            <button id="btn-next" onclick="goNext()"
                class="flex items-center px-4 py-2 text-white bg-sky-600 hover:bg-sky-700 rounded-lg shadow-md shadow-sky-200 transition-colors font-bold text-sm tracking-wide disabled:opacity-30 disabled:cursor-not-allowed">
                下一節 <span class="ml-2 text-lg">→</span>
            </button>
        </div>
    </div>

    <script>
        // --- Data & Content ---
        const appData = {
            modules: [
                { id: 'step1', title: '暖身與視野', icon: '👀' },
                { id: 'step2', title: '軌跡模擬器', icon: '🎯' },
                { id: 'step3', title: '籃框的限制', icon: '📏' },
                { id: 'step4', title: '判別式解析', icon: '⚡' },
                { id: 'step5', title: '球隊經營戰', icon: '🏆' }
            ]
        };

        let currentIndex = 0;
        let activeChart = null;

        let parabolaState = { a: -0.5, h: 2, k: 5 };
        let currentDiscriminant = 0;
        let currentDomainScenario = 'A';

        // --- Global Chart Setup ---
        Chart.defaults.font.family = "'JetBrains Mono', 'Noto Sans TC', sans-serif";
        Chart.defaults.color = '#0284c7';
        Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.4)';
        Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15, 23, 42, 0.9)';
        Chart.defaults.plugins.tooltip.padding = 12;
        Chart.defaults.plugins.tooltip.cornerRadius = 8;

        const axisArrowPlugin = {
            id: 'axisArrowPlugin',
            afterDraw(chart) {
                const { ctx, chartArea: { top, right, bottom, left }, scales: { x, y } } = chart;
                ctx.save();

                let axisColor = '#94a3b8'; // default slate-400
                if (chart.canvas.id === 'parabolaChart' || chart.canvas.id === 'deltaChart') {
                    axisColor = chart.canvas.id === 'parabolaChart' ? 'rgba(255, 255, 255, 0.9)' : '#0284c7';
                } else if (chart.canvas.id === 'domainChart') {
                    axisColor = 'rgba(15, 23, 42, 0.3)';
                }

                // X axis right arrow
                let yPos;
                if (y.type === 'category') {
                    const idx = y.ticks.findIndex(t => parseFloat(t.label) === 0);
                    if (idx >= 0) yPos = y.getPixelForTick(idx);
                } else {
                    yPos = y.getPixelForValue(0);
                }

                if (typeof yPos === 'number' && yPos >= top && yPos <= bottom) {
                    ctx.fillStyle = axisColor;
                    ctx.beginPath();
                    ctx.moveTo(right, yPos);
                    ctx.lineTo(right - 10, yPos - 5);
                    ctx.lineTo(right - 10, yPos + 5);
                    ctx.fill();
                }

                // Y axis top arrow
                let xPos;
                if (x.type === 'category') {
                    const idx = x.ticks.findIndex(t => parseFloat(t.label) === 0);
                    if (idx >= 0) xPos = x.getPixelForTick(idx);
                } else {
                    xPos = x.getPixelForValue(0);
                }

                if (typeof xPos === 'number' && xPos >= left && xPos <= right) {
                    ctx.fillStyle = axisColor;
                    ctx.beginPath();
                    ctx.moveTo(xPos, top);
                    ctx.lineTo(xPos - 5, top + 10);
                    ctx.lineTo(xPos + 5, top + 10);
                    ctx.fill();
                }

                ctx.restore();
            }
        };
        Chart.register(axisArrowPlugin);

        // --- Core Logic ---
        function init() {
            renderNav();
            renderStep();
        }

        function renderNav() {
            const navContainer = document.getElementById('nav-menu');
            const mobileNavContainer = document.getElementById('mobile-nav-items');

            navContainer.innerHTML = '';
            mobileNavContainer.innerHTML = '';

            appData.modules.forEach((mod, idx) => {
                const btn = document.createElement('button');
                btn.className = `nav-item pb-1 text-base font-bold transition-colors duration-200 ${currentIndex === idx ? 'active text-sky-700' : 'text-slate-400 hover:text-sky-600'}`;
                btn.innerHTML = `<span class="mr-1">${mod.icon}</span> ${mod.title}`;
                btn.onclick = () => { currentIndex = idx; renderStep(); renderNav(); };
                navContainer.appendChild(btn);

                const mBtn = document.createElement('button');
                mBtn.className = `block w-full text-left px-4 py-3 rounded-xl text-base font-bold ${currentIndex === idx ? 'bg-sky-50 text-sky-600 border border-sky-100' : 'text-slate-500 hover:bg-slate-50'}`;
                mBtn.innerHTML = `<span class="mr-2">${mod.icon}</span> ${mod.title}`;
                mBtn.onclick = () => {
                    currentIndex = idx;
                    renderStep();
                    renderNav();
                    document.getElementById('mobile-menu').classList.add('hidden');
                };
                mobileNavContainer.appendChild(mBtn);
            });

            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === appData.modules.length - 1;
            document.getElementById('progress-indicator').textContent = `${currentIndex + 1}/${appData.modules.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / appData.modules.length) * 100}%`;
        }

        document.getElementById('mobile-menu-btn').onclick = () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        };

        function goNext() { if (currentIndex < appData.modules.length - 1) { currentIndex++; renderStep(); renderNav(); } }
        function goPrev() { if (currentIndex > 0) { currentIndex--; renderStep(); renderNav(); } }

        function renderStep() {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            if (activeChart) { activeChart.destroy(); activeChart = null; }

            const stepId = appData.modules[currentIndex].id;
            switch (stepId) {
                case 'step1': renderStep1(container); break;
                case 'step2': renderStep2(container); break;
                case 'step3': renderStep3(container); break;
                case 'step4': renderStep4(container); break;
                case 'step5': renderStep5(container); break;
            }
        }

        // --- Components ---
        const TeacherNote = (content) => `
            <div class="mb-8 border-l-4 border-orange-500 bg-white p-5 shadow-sm rounded-r-xl relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-6xl opacity-5">📋</div>
                <div class="flex items-center gap-2 mb-3">
                    <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-md font-black tracking-widest uppercase border border-orange-200">Coach Notes // 教練戰術板</span>
                </div>
                <div class="text-slate-700 text-sm leading-relaxed font-medium">${content}</div>
            </div>
        `;

        // --- Global Toggle Answer Function ---
        window.toggleAnswer = function (btn) {
            const answerDiv = btn.nextElementSibling;
            const isHidden = answerDiv.classList.contains('hidden');
            const theme = btn.getAttribute('data-theme') || 'sky';

            const skyClasses = ['bg-sky-100', 'text-sky-700', 'hover:bg-sky-200'];
            const orangeClasses = ['bg-orange-100', 'text-orange-700', 'hover:bg-orange-200'];
            const slateClasses = ['bg-slate-100', 'text-slate-700', 'hover:bg-slate-200'];
            const activeClasses = ['bg-slate-200', 'text-slate-600', 'hover:bg-slate-300'];

            let themeClasses = slateClasses;
            if (theme === 'sky') themeClasses = skyClasses;
            if (theme === 'orange') themeClasses = orangeClasses;

            if (isHidden) {
                answerDiv.classList.remove('hidden');
                answerDiv.classList.add('fade-in');
                btn.innerHTML = '🙈 隱藏解答';
                btn.classList.remove(...themeClasses);
                btn.classList.add(...activeClasses);
            } else {
                answerDiv.classList.add('hidden');
                answerDiv.classList.remove('fade-in');
                btn.innerHTML = '👁️ 顯示解答';
                btn.classList.remove(...activeClasses);
                btn.classList.add(...themeClasses);
            }
        };

        // --- Render Content Functions ---

        function renderStep1(container) {
            container.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-8">
                    
                    <!-- HERO SECTION -->
                    <div class="bg-theme-grid rounded-[2rem] overflow-hidden shadow-2xl relative h-72 md:h-96 flex flex-col justify-center items-center border-[6px] border-white z-10">
                        <div class="absolute inset-0 bg-gradient-to-t from-sky-900/30 to-transparent"></div>
                        <!-- Ball Animation -->
                        <div class="absolute left-[20%] md:left-[30%] bottom-1/4">
                            <span class="text-5xl md:text-7xl basketball-bounce drop-shadow-xl">🏀</span>
                        </div>
                        <!-- Texts -->
                        <div class="relative z-20 text-center mt-8">
                            <h1 class="text-5xl md:text-[5rem] font-black text-white tracking-widest text-shadow-hero mb-4 leading-tight">拋物線：<br class="md:hidden">看見數學的軌跡</h1>
                            <p class="text-xl md:text-3xl font-bold text-white text-shadow-hero tracking-wide">從投籃到舞台設計，解開二次函數的秘密</p>
                        </div>
                    </div>

                    ${TeacherNote(`
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>建立直覺：</strong>在教代數符號之前，先用生活中的「販賣機」與「球員」引導學生理解函數的定義：「有規則的對應關係」。</li>
                            <li><strong>互動體驗：</strong>請學生上台點擊不同的「付款方式」按鈕。引導他們發現：為什麼「投1個10塊」、「投2個5塊」或「投10個1塊」都能得到同一罐飲料（多對一）？但按 C1 隨機掉多種飲料就是「機器壞掉」（一對多不是函數）？</li>
                        </ul>
                    `)}

                    <!-- 什麼是函數？生活對應區塊 -->
                    <div class="bg-white p-8 rounded-3xl border-2 border-sky-100 shadow-lg">
                        <h3 class="text-2xl md:text-3xl font-black text-sky-900 mb-4 flex items-center gap-3">
                            <span class="text-3xl">🧃</span> 什麼是「函數」？生活中的對應關係
                        </h3>
                        <p class="text-base text-slate-600 font-bold mb-8 bg-sky-50 p-4 rounded-xl border border-sky-100">
                            數學上的「函數 (Function)」聽起來很抽象，但它其實就像是一台<strong class="text-orange-600">「正常運作的機器」</strong>。<br>
                            記住函數運作的鐵則：<strong class="bg-white px-2 py-0.5 rounded shadow-sm text-sky-700 border border-slate-200 mt-2 inline-block">給定一個輸入 (x)，必定只會得到一個明確的輸出 (y)</strong>。
                        </p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-center">
                            <!-- Concept 1 -->
                            <div class="bg-slate-50 p-5 rounded-2xl border-2 border-slate-200 shadow-sm">
                                <div class="text-4xl mb-3 drop-shadow-sm h-10 flex items-center justify-center">🥤</div>
                                <h4 class="font-black text-slate-800 text-lg mb-2">一對一 (是函數)</h4>
                                <p class="text-sm text-slate-500 font-bold mb-4">專屬按鈕 ➔ 專屬飲料</p>
                                <div class="flex justify-center items-center gap-2 text-slate-600 font-mono text-sm font-bold">
                                    <span class="bg-white px-2 py-1.5 rounded-lg shadow border border-slate-200">按鈕 A1</span> <span class="text-orange-500">➔</span> <span class="bg-white px-2 py-1.5 rounded-lg shadow border border-slate-200">運動飲料</span>
                                </div>
                                <p class="text-[11px] text-slate-500 mt-5 font-bold leading-tight">一個按鈕對應一種專屬飲料，<br>最標準的正常機器！</p>
                            </div>
                            <!-- Concept 2 -->
                            <div class="bg-sky-50 p-5 rounded-2xl border-2 border-sky-200 shadow-sm relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-16 h-16 bg-white opacity-20 rounded-bl-full"></div>
                                <div class="mb-3 h-10 flex items-center justify-center">
                                    <img src="https://images.unsplash.com/photo-1523362628745-0c100150b504?w=150&h=150&fit=crop" class="w-10 h-10 object-cover rounded-lg shadow-sm border border-sky-100" alt="礦泉水" onerror="this.outerHTML='<span class=\\'text-4xl drop-shadow-sm\\'>💧</span>'">
                                </div>
                                <h4 class="font-black text-sky-800 text-lg mb-2">多對一 (是函數)</h4>
                                <p class="text-sm text-sky-600 font-bold mb-4">不同投幣組合 ➔ 同種飲料</p>
                                <div class="flex flex-col gap-1 items-center text-sky-800 font-mono text-xs font-bold w-full">
                                    <div class="flex items-center gap-2 w-full justify-center">
                                        <span class="bg-white px-2 py-1.5 rounded shadow-sm border border-sky-100 w-[72px] text-center whitespace-nowrap">1個10塊</span> 
                                        <span class="text-orange-400">↘</span>
                                    </div>
                                    <div class="flex items-center gap-2 w-full justify-center">
                                        <span class="bg-white px-2 py-1.5 rounded shadow-sm border border-sky-100 w-[72px] text-center whitespace-nowrap">2個5塊</span> 
                                        <span class="text-orange-500 font-black text-base">➔</span> 
                                        <span class="bg-sky-600 text-white font-black px-2 py-1 rounded-lg shadow-md text-sm border-2 border-sky-400 flex-shrink-0">礦泉水</span>
                                    </div>
                                    <div class="flex items-center gap-2 w-full justify-center">
                                        <span class="bg-white px-2 py-1.5 rounded shadow-sm border border-sky-100 w-[72px] text-center whitespace-nowrap">10個1塊</span> 
                                        <span class="text-orange-400">↗</span>
                                    </div>
                                </div>
                                <p class="text-[11px] text-sky-600 mt-3 font-bold leading-tight bg-white/50 p-1.5 rounded w-full">不同的投幣方式，最後都得到一樣的飲料！<br>只要結果能確定，就是函數。</p>
                            </div>
                            <!-- Concept 3 -->
                            <div class="bg-rose-50 p-5 rounded-2xl border-2 border-rose-200 shadow-sm relative overflow-hidden">
                                <div class="absolute top-3 right-3 text-rose-500 font-black text-xs border-2 border-rose-300 px-2 py-0.5 rounded-lg bg-white shadow-sm rotate-12">NG</div>
                                <div class="text-4xl mb-3 drop-shadow-sm h-10 flex items-center justify-center">💥</div>
                                <h4 class="font-black text-rose-800 text-lg mb-2">一對多 (<span class="text-rose-600 underline">不是</span>函數)</h4>
                                <p class="text-sm text-rose-600 font-bold mb-4">同一按鈕 ➔ 同時掉出多樣</p>
                                <div class="flex justify-center items-center gap-2 text-rose-800 font-mono text-xs font-bold">
                                    <span class="bg-white px-2 py-2 rounded-lg shadow-sm border border-rose-100 whitespace-nowrap">按鈕 C1</span> <span class="text-rose-400 text-base">➔</span> 
                                    <div class="flex flex-col gap-1.5">
                                        <span class="bg-white px-3 py-1.5 rounded shadow-sm border border-rose-100 text-slate-600 text-base">🥤 + ☕</span>

        function updateDomainChartData() {
            if (!activeChart) return;

            const xs = [], ys_full = [], ys_restricted = [];
            const minX = -1, maxX = 7;
            const domainStart = currentDomainScenario === 'A' ? 0 : 3;
            const domainEnd = currentDomainScenario === 'A' ? 5 : 6;

            const mainColor = currentDomainScenario === 'A' ? '#f97316' : '#0284c7';
            activeChart.data.datasets[1].borderColor = mainColor;

            for (let x = minX; x <= maxX; x += 0.2) {
                const xVal = parseFloat(x.toFixed(1));
                xs.push(xVal);
                const y = Math.pow(xVal - 2, 2) + 1;
                ys_full.push(y);
                if (xVal >= domainStart && xVal <= domainEnd) {
                    ys_restricted.push(y);
                } else {
                    ys_restricted.push(null);
                }
            }

            activeChart.data.labels = xs;
            activeChart.data.datasets[0].data = ys_full;
            activeChart.data.datasets[1].data = ys_restricted;
            activeChart.data.datasets[1].label = `限制範圍 [${domainStart}, ${domainEnd}]`;
            activeChart.update();
        }

        function updateDiscriminant(caseIdx) {
            currentDiscriminant = caseIdx;

            const buttons = document.querySelectorAll('.disc-btn');
            buttons.forEach((btn, idx) => {
                const title = btn.querySelector('.text-xl');
                if (idx === caseIdx) {
                    btn.classList.add('border-orange-500', 'bg-white', 'shadow-md');
                    btn.classList.remove('border-transparent', 'bg-transparent');
                    title.classList.add('text-orange-600');
                    title.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('border-orange-500', 'bg-white', 'shadow-md');
                    btn.classList.add('border-transparent', 'bg-transparent');
                    title.classList.remove('text-orange-600');
                    title.classList.add('text-slate-500');
                }
            });

            const xs = [], ys = [];
            let func, detailHTML, formulaExp, rootClass;

            if (caseIdx === 0) {
                func = (x) => x * x - 2;
                detailHTML = `
                    <p><strong class="text-white font-mono text-lg bg-slate-700 px-2 rounded border border-slate-600">方程式 x² - 2 = 0</strong> <br>擁有 <strong class="text-orange-400">兩個相異實根</strong>。</p>
                    <p class="mt-4 text-slate-400 border-l-2 border-slate-600 pl-3">圖形穿過 x 軸 (海平面)，產生兩個實體交點。在解不等式時，這兩個交點即為邊界界線。</p>
                `;
                rootClass = "text-orange-600";
                formulaExp = "Δ 為正數，開根號具備實數意義。公式中的「±」將產生兩個不同的座標解。";
            } else if (caseIdx === 1) {
                func = (x) => x * x;
                detailHTML = `
                    <p><strong class="text-white font-mono text-lg bg-slate-700 px-2 rounded border border-slate-600">方程式 x² = 0</strong> <br>具備 <strong class="text-sky-400">重根</strong>。</p>
                    <p class="mt-4 text-slate-400 border-l-2 border-slate-600 pl-3">拋物線頂點剛好與 x 軸 (海平面) 相切，僅有一個交點。此狀態下圖形恆在水面之上或剛好觸碰。</p>
                `;
                rootClass = "text-slate-400";
                formulaExp = "Δ 為 0，根號項消去。公式解僅剩下 -b/2a，這正是拋物線頂點的 x 座標！";
            } else {
                func = (x) => x * x + 2;
                detailHTML = `
                    <p><strong class="text-white font-mono text-lg bg-slate-700 px-2 rounded border border-slate-600">方程式 x² + 2 = 0</strong> <br><strong class="text-rose-400">無實數解</strong>。</p>

                `;
                rootClass = "text-rose-500 opacity-30";
                formulaExp = "陷阱！Δ 為負數。在實數世界中，負數無法開根號。代數上的「無解」完美對應幾何上的「無交點」。";

            if (rootEl) rootEl.className = `${rootClass} font-bold transition-colors`;

            const dataPts = [];

                dataPts.push({ x: parseFloat(x.toFixed(1)), y: func(x) });

            activeChart.data.datasets[0].data = dataPts;
            activeChart.update();

            if (document.getElementById('formula-explanation')) {
                document.getElementById('formula-explanation').textContent = formulaExp;

        // --- Numerical Machine Logic ---
        window.runNumericalMachine = function () {
            const inputEl = document.getElementById('machine-input');
            const processEl = document.getElementById('machine-process');
            const outputEl = document.getElementById('machine-output');
            const machineBox = processEl.parentElement;

            const x = parseFloat(inputEl.value);
            if (isNaN(x)) return;

            outputEl.textContent = '?';
            outputEl.className = "w-20 h-[52px] flex items-center justify-center text-3xl font-mono font-black text-slate-300 border-b-4 border-dashed border-slate-300 transition-all duration-300";

            processEl.style.opacity = '1';
            machineBox.classList.add('border-orange-500', 'shadow-orange-500/30');

            const displayX = x < 0 ? `(${x})` : x;
            processEl.textContent = `${displayX}² - 4${displayX} + 5`;

            setTimeout(() => {
                const result = (x * x) - (4 * x) + 5;
                processEl.style.opacity = '0';
                machineBox.classList.remove('border-orange-500', 'shadow-orange-500/30');

                outputEl.textContent = result;
                outputEl.className = "w-20 h-[52px] flex items-center justify-center text-3xl font-mono font-black text-white border-b-4 border-solid border-orange-600 bg-orange-500 rounded transition-all duration-300 transform scale-110 shadow-lg";

                setTimeout(() => outputEl.classList.remove('scale-110'), 200);
            }, 800);
        };

        // Start
        init();
    </script>
